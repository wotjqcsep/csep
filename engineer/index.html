<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CSEP 기사앱</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1f2b">
<style>
:root{--primary:#3b5bdb;--success:#2f9e44;--warning:#f08c00;--danger:#e03131;--bg:#f1f3f5;--gray-400:#adb5bd;--gray-500:#868e96;--gray-600:#495057}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Malgun Gothic',-apple-system,sans-serif;background:var(--bg);color:#343a40;font-size:15px;max-width:520px;margin:0 auto;min-height:100vh}
.topbar{background:#1a1f2b;color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.topbar h1{font-size:18px;color:#6b9cff}
.topbar .who{font-size:13px;color:#c9ced8}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e9ecef;position:sticky;top:52px;z-index:40}
.tab{flex:1;padding:12px;border:none;background:none;font-size:14px;color:var(--gray-500);cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--primary);font-weight:700;border-bottom-color:var(--primary)}
.content{padding:14px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.cust-name{font-size:17px;font-weight:700}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600}
.badge.new{background:#e7f5ff;color:#1971c2}
.badge.assigned{background:#fff3bf;color:#e67700}
.badge.in_progress{background:#d3f9d8;color:#2b8a3e}
.badge.completed{background:#e9ecef;color:#868e96}
.info-line{font-size:13px;color:var(--gray-600);margin:3px 0}
.info-line a{color:var(--primary);text-decoration:none}
.symptom{background:var(--bg);border-radius:8px;padding:10px;margin:8px 0;font-size:14px}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-primary{background:var(--primary);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-ghost{background:#f1f3f5;color:var(--gray-600)}
.empty{text-align:center;padding:60px 20px;color:var(--gray-400)}
/* 로그인 */
.login{padding:40px 24px;text-align:center}
.login h2{font-size:24px;color:var(--primary);margin-bottom:6px}
.login p{color:var(--gray-500);margin-bottom:30px;font-size:14px}
.eng-btn{display:block;width:100%;padding:16px;margin-bottom:10px;border:1px solid #dee2e6;border-radius:12px;background:#fff;font-size:16px;cursor:pointer;text-align:left}
.eng-btn:hover{border-color:var(--primary)}
.eng-btn .role{float:right;font-size:12px;color:var(--warning)}
/* 모달 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.sheet{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:22px}
.sheet h3{font-size:18px;margin-bottom:16px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:13px;color:var(--gray-600);margin-bottom:5px}
.fg input,.fg textarea{width:100%;padding:11px 13px;border:1px solid #dee2e6;border-radius:9px;font-size:15px;font-family:inherit}
.fg textarea{min-height:80px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
</style>
</head>
<body>
<div id="app"><div class="empty">불러오는 중...</div></div>

<script>
const API='/api';
const S={ engineer:null, tab:'active', receptions:[], engineers:[], customers:[], computers:[], presets:[], parts:[], chatUnread:{}, chatOpen:null, stats:null, modalRec:null };
const DEVICE_TYPES={ desktop:'데스크톱', laptop:'노트북', server:'서버', printer:'프린터', other:'기타' };
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const won=n=>'₩'+(Number(n)||0).toLocaleString();
async function api(m,u,b){const o={method:m,headers:{'Content-Type':'application/json'}};if(b)o.body=JSON.stringify(b);const r=await fetch(API+u,o);if(!r.ok)throw new Error((await r.json().catch(()=>({}))).error||r.status);return r.json();}

// ── 로그인 ──
async function renderLogin(){
  let engineers=[];
  try{ engineers=await api('GET','/engineers'); }catch(e){}
  document.getElementById('app').innerHTML=`
    <div class="login">
      <h2>CSEP 기사앱</h2><p>본인 이름을 선택하세요</p>
      ${engineers.length? engineers.map(e=>`<button class="eng-btn" onclick="login(${e.id},${e.is_admin})">${esc(e.name)}${e.is_admin?'<span class="role">대표</span>':''}</button>`).join('') : '<p style="color:var(--gray-400)">등록된 기사가 없습니다.<br>관리자 화면에서 기사를 먼저 추가하세요.</p>'}
    </div>`;
}
async function login(id,isAdmin){
  let password=null;
  if(isAdmin){ password=prompt('대표 비밀번호:'); if(password===null)return; }
  try{
    const e=await api('POST','/engineer-login',{engineer_id:id,password});
    S.engineer=e; localStorage.setItem('csep_eng',JSON.stringify(e));
    connectSSE(); loadReceptions(true);
  }catch(err){ alert(err.message); }
}
function logout(){ localStorage.removeItem('csep_eng'); S.engineer=null; renderLogin(); }

// ── 데이터 ──
async function loadReceptions(showLoading){
  if(!S.engineer)return;
  try{
    const all = S.engineer.is_admin ? '?all=1' : '';   // 대표는 전체 조회 (미배정·전체 탭용)
    S.receptions = await api('GET',`/engineer/${S.engineer.id}/receptions${all}`);
    if(!S.presets.length){ try{ S.presets = await api('GET','/result-presets'); }catch(e){} }
    if(!S.parts.length){ try{ S.parts = await api('GET','/inventory'); }catch(e){} }
    try{ S.chatUnread = await api('GET',`/messages/unread-engineer/${S.engineer.id}`); }catch(e){}
    if(S.engineer.is_admin){
      if(!S.engineers.length){ try{ S.engineers = await api('GET','/engineers'); }catch(e){} }
      if(!S.customers.length){ try{ S.customers = await api('GET','/customers'); }catch(e){} }
      if(!S.computers.length){ try{ S.computers = await api('GET','/computers'); }catch(e){} }
      try{ S.stats = await api('GET','/stats'); }catch(e){}
    }
    render();
  }catch(e){ if(showLoading)document.getElementById('app').innerHTML='<div class="empty">서버 연결 실패</div>'; }
}
function engName(id){ const e=S.engineers.find(x=>x.id==id); return e?e.name:(id?`기사${id}`:'-'); }

// ── 렌더 ──
function render(){
  if(!S.engineer)return renderLogin();
  const isAdmin=S.engineer.is_admin, myId=S.engineer.id;
  const mine=S.receptions.filter(r=>r.assigned_engineer_id==myId&&(r.status==='assigned'||r.status==='in_progress'));
  const unassigned=S.receptions.filter(r=>r.status==='new');
  const done=S.receptions.filter(r=>r.status==='completed');
  const all=S.receptions;
  let list;
  if(S.tab==='unassigned')list=unassigned; else if(S.tab==='all')list=all; else if(S.tab==='done')list=done; else list=mine;
  const tabs = isAdmin
    ? [['active',`내 작업 (${mine.length})`],['unassigned',`미배정 (${unassigned.length})`],['all',`전체 (${all.length})`],['done',`완료 (${done.length})`]]
    : [['active',`진행 작업 (${mine.length})`],['done',`완료 (${done.length})`]];
  document.getElementById('app').innerHTML=`
    <div class="topbar"><h1>CSEP 기사앱</h1><span class="who">${esc(S.engineer.name)}${isAdmin?' · 대표':''} · <a onclick="logout()" style="color:#6b9cff;cursor:pointer">로그아웃</a></span></div>
    <div class="tabs">
      ${tabs.map(([id,label])=>`<button class="tab ${S.tab===id?'active':''}" onclick="setTab('${id}')">${label}</button>`).join('')}
    </div>
    <div class="content">
      ${isAdmin?`<div style="display:flex;gap:8px;margin-bottom:12px"><button class="btn btn-primary" style="margin:0" onclick="openWorkOrder()">+ 작업지시</button><button class="btn btn-ghost" style="margin:0" onclick="openStats()">📊 기사별 실적</button></div>`:''}
      ${list.length? list.map(r=>cardHtml(r,S.tab)).join('') : '<div class="empty">작업이 없습니다</div>'}
    </div>`;
}
function cardHtml(r,mode){
  const st={new:'신규',assigned:'배정',in_progress:'진행중',completed:'완료'}[r.status]||r.status;
  const mine=r.assigned_engineer_id==S.engineer.id;
  const engLine = (mode==='all'&&r.assigned_engineer_id)?`<div class="info-line">👷 담당: ${esc(engName(r.assigned_engineer_id))}</div>`:'';
  return `<div class="card">
    <div class="card-head">
      <div><div class="cust-name">${esc(r.customer_name)||esc(r.customer_phone)||'고객'}</div>${r.customer_company?`<div class="info-line">${esc(r.customer_company)}</div>`:''}</div>
      <span class="badge ${r.status}">${st}</span>
    </div>
    ${r.customer_phone?`<div class="info-line">📞 <a href="tel:${esc(r.customer_phone)}">${esc(r.customer_phone)}</a></div>`:''}
    ${r.customer_address?`<div class="info-line">📍 ${esc(r.customer_address)} <a onclick="openMapFor(${r.id})" style="color:var(--primary);cursor:pointer;margin-left:4px;font-weight:600">🗺️ 길찾기</a></div>`:''}
    ${engLine}
    <div class="symptom">${esc(r.symptom)||'(증상 없음)'}</div>
    ${r.status==='completed'&&r.work_description?`<div class="info-line">✅ ${esc(r.work_description)} · ${won(r.total_cost)}</div>`:''}
    ${r.status==='completed'?`<button class="btn btn-ghost" onclick="openPhotos(${r.id})">📷 작업 사진</button>`:''}
    ${r.status!=='new'?`<button class="btn btn-ghost" onclick="openChat(${r.id})">💬 대화${S.chatUnread[r.id]?` <span style="background:var(--danger);color:#fff;border-radius:10px;padding:0 6px;font-size:11px">${S.chatUnread[r.id]}</span>`:''}</button>`:''}
    ${r.status==='new'&&S.engineer.is_admin?`<button class="btn btn-primary" onclick="openAssign(${r.id})">기사 배정</button>`:''}
    ${r.status==='assigned'&&mine?`<button class="btn btn-primary" onclick="startWork(${r.id})">작업 시작</button>`:''}
    ${r.status==='in_progress'&&mine?`<button class="btn btn-success" onclick="openComplete(${r.id})">작업 완료 입력</button>`:''}
  </div>`;
}
function setTab(t){ S.tab=t; render(); }
// 지도 길찾기 (고객 주소 → 카카오맵)
function openMapFor(id){ const r=S.receptions.find(x=>x.id==id); if(r&&r.customer_address) window.open('https://map.kakao.com/?q='+encodeURIComponent(r.customer_address),'_blank'); }
// 대표: 기사별 실적
function openStats(){
  const st=S.stats, es=st?st.engineer_stats:[];
  document.getElementById('app').insertAdjacentHTML('beforeend',`
    <div class="overlay" id="ov" onclick="if(event.target===this)closeSheet()">
      <div class="sheet"><h3>📊 기사별 실적</h3>
        ${st?`<div style="display:flex;gap:8px;margin-bottom:14px">
          <div style="flex:1;background:var(--bg);border-radius:10px;padding:10px;text-align:center"><div style="font-size:12px;color:var(--gray-500)">총 매출</div><div style="font-size:18px;font-weight:700">${won(st.total_revenue)}</div></div>
          <div style="flex:1;background:var(--bg);border-radius:10px;padding:10px;text-align:center"><div style="font-size:12px;color:var(--gray-500)">완료 작업</div><div style="font-size:18px;font-weight:700">${st.completed_jobs}건</div></div>
          <div style="flex:1;background:var(--bg);border-radius:10px;padding:10px;text-align:center"><div style="font-size:12px;color:var(--gray-500)">미수금</div><div style="font-size:18px;font-weight:700;color:var(--danger)">${won(st.total_outstanding)}</div></div>
        </div>`:''}
        ${es.length?es.map(e=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f1f3f5"><div><strong>${esc(e.name)}</strong><div style="font-size:12px;color:var(--gray-500)">완료 ${e.completed_jobs} / 전체 ${e.total_jobs}건</div></div><div style="font-weight:700;color:var(--primary)">${won(e.revenue)}</div></div>`).join(''):'<div class="empty">데이터 없음</div>'}
        <button class="btn btn-ghost" onclick="closeSheet()">닫기</button>
      </div></div>`);
}

// ── 대표: 기사 배정 (현장) ──
function openAssign(id){
  const r=S.receptions.find(x=>x.id==id);
  document.getElementById('app').insertAdjacentHTML('beforeend',`
    <div class="overlay" id="ov" onclick="if(event.target===this)closeSheet()">
      <div class="sheet">
        <h3>기사 배정 - ${esc(r.customer_name)||esc(r.customer_phone)||'고객'}</h3>
        <div class="symptom">${esc(r.symptom)||'(증상 없음)'}</div>
        <div class="fg"><label>배정할 기사</label>
          <select id="a_eng" style="width:100%;padding:11px 13px;border:1px solid #dee2e6;border-radius:9px;font-size:15px">
            <option value="">선택하세요</option>
            ${S.engineers.map(e=>`<option value="${e.id}">${esc(e.name)}${e.is_admin?' (대표)':''}</option>`).join('')}
          </select></div>
        <button class="btn btn-primary" onclick="doAssign(${id})">배정</button>
        <button class="btn btn-ghost" onclick="closeSheet()">취소</button>
      </div>
    </div>`);
}
async function doAssign(id){
  const eng=document.getElementById('a_eng').value;
  if(!eng){ alert('기사를 선택하세요'); return; }
  await api('PUT',`/receptions/${id}/assign?engineer_id=${eng}`);
  closeSheet(); loadReceptions();
}

// ── 대표: 작업지시 생성 (고객·장비 DB에서 → 기사/본인 배정) ──
let woState={ customerId:'', search:'' };
function openWorkOrder(){ woState={ customerId:'', search:'' }; renderWorkOrderSheet(); }
function renderWorkOrderSheet(){
  const sel=S.customers.find(c=>c.id==woState.customerId);
  const q=woState.search.toLowerCase();
  const filtered=woState.customerId?[]:S.customers.filter(c=>(c.name||'').toLowerCase().includes(q)||(c.phone||'').includes(q)).slice(0,8);
  const comps=woState.customerId?S.computers.filter(c=>c.customer_id==woState.customerId):[];
  const custBlock = sel
    ? `<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 13px;border:1px solid #dee2e6;border-radius:9px"><span><strong>${esc(sel.name)||esc(sel.phone)}</strong>${sel.name?` <span style="color:var(--gray-500);font-size:13px">${esc(sel.phone)}</span>`:''}</span><button onclick="woState.customerId='';renderWorkOrderSheet()" style="border:none;background:none;font-size:18px;color:var(--gray-400);cursor:pointer">×</button></div>`
    : `<input id="wo_search" placeholder="이름·전화번호 검색" value="${esc(woState.search)}" oninput="woState.search=this.value;renderWorkOrderSheet();var i=document.getElementById('wo_search');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length)}">
       ${filtered.length?`<div style="border:1px solid #eee;border-radius:9px;margin-top:4px;max-height:170px;overflow-y:auto">${filtered.map(c=>`<div onmousedown="woState.customerId='${c.id}';woState.search='';renderWorkOrderSheet()" style="padding:10px 12px;border-bottom:1px solid #f1f3f5;cursor:pointer"><strong>${esc(c.name)||esc(c.phone)}</strong>${c.name?` <span style="color:var(--gray-400);font-size:12px">${esc(c.phone)}</span>`:''}${c.company_name?` · ${esc(c.company_name)}`:''}</div>`).join('')}</div>`:(woState.search?'<div style="color:var(--gray-400);padding:8px 4px">검색 결과 없음</div>':'')}`;
  const html=`
    <div class="overlay" id="ov" onclick="if(event.target===this)closeSheet()">
      <div class="sheet">
        <h3>작업지시 등록</h3>
        <div class="fg"><label>고객 *</label>${custBlock}</div>
        ${comps.length?`<div class="fg"><label>장비 (선택)</label><select id="wo_comp" style="width:100%;padding:11px 13px;border:1px solid #dee2e6;border-radius:9px;font-size:15px"><option value="">선택 안함</option>${comps.map(c=>`<option value="${c.id}">${esc(c.name)||'장비'} · ${DEVICE_TYPES[c.device_type]||c.device_type}</option>`).join('')}</select></div>`:''}
        <div class="fg"><label>작업 내용 / 증상 *</label><textarea id="wo_symptom" placeholder="작업 지시 내용을 입력하세요"></textarea></div>
        <div class="fg"><label>담당 기사 *</label><select id="wo_eng" style="width:100%;padding:11px 13px;border:1px solid #dee2e6;border-radius:9px;font-size:15px"><option value="">선택하세요</option>${S.engineers.map(e=>`<option value="${e.id}" ${e.id==S.engineer.id?'selected':''}>${esc(e.name)}${e.is_admin?' (대표)':''}${e.id==S.engineer.id?' — 나':''}</option>`).join('')}</select></div>
        <button class="btn btn-primary" onclick="submitWorkOrder()">작업지시 + 배정</button>
        <button class="btn btn-ghost" onclick="closeSheet()">취소</button>
      </div>
    </div>`;
  const existing=document.getElementById('ov');
  if(existing) existing.outerHTML=html; else document.getElementById('app').insertAdjacentHTML('beforeend',html);
}
async function submitWorkOrder(){
  if(!woState.customerId){ alert('고객을 선택하세요'); return; }
  const symptom=document.getElementById('wo_symptom').value.trim();
  if(!symptom){ alert('작업 내용을 입력하세요'); return; }
  const engId=document.getElementById('wo_eng').value;
  if(!engId){ alert('담당 기사를 선택하세요'); return; }
  const compEl=document.getElementById('wo_comp');
  const computerId=compEl&&compEl.value?Number(compEl.value):null;
  const rec=await api('POST','/receptions',{ customer_id:Number(woState.customerId), computer_id:computerId, reception_channel:'direct', symptom });
  await api('PUT',`/receptions/${rec.id}/assign?engineer_id=${engId}`);
  closeSheet(); loadReceptions();
}

// ── 작업 시작/완료 ──
async function startWork(id){ await api('PUT',`/engineer/receptions/${id}/start`); loadReceptions(); }
function openComplete(id){
  const r=S.receptions.find(x=>x.id==id);
  completePhotos=[];
  document.getElementById('app').insertAdjacentHTML('beforeend',`
    <div class="overlay" id="ov" onclick="if(event.target===this)closeSheet()">
      <div class="sheet">
        <h3>작업 완료 - ${esc(r.customer_name)||'고객'}</h3>
        <div class="fg"><label>작업 내용 *</label><textarea id="w_desc" placeholder="처리한 작업을 입력하세요"></textarea>
          ${S.presets.length?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">${S.presets.map((p,i)=>`<span onclick="appendField('w_desc',S.presets[${i}].text)" style="padding:5px 10px;background:#e7f5ff;color:#1971c2;border-radius:14px;font-size:12px;cursor:pointer">${esc(p.text)}</span>`).join('')}</div>`:''}
        </div>
        <div class="fg"><label>사용 부품</label><input id="w_parts" placeholder="예: SSD 500GB">
          ${S.parts.length?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">${S.parts.slice(0,12).map((p,i)=>`<span onclick="appendField('w_parts',S.parts[${i}].part_name)" style="padding:5px 10px;background:#f1f3f5;color:#495057;border-radius:14px;font-size:12px;cursor:pointer">${esc(p.part_name)}</span>`).join('')}</div>`:''}
        </div>
        <div class="row2">
          <div class="fg"><label>부품비</label><input id="w_cparts" type="number" value="0"></div>
          <div class="fg"><label>공임비</label><input id="w_clabor" type="number" value="0"></div>
        </div>
        <div class="fg"><label>작업 사진 (수리 전/후)</label>
          <input type="file" id="w_photo" accept="image/*" capture="environment" onchange="addCompletePhoto(this)" style="font-size:13px">
          <div id="w_photos" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px"></div>
        </div>
        <button class="btn btn-success" onclick="submitComplete(${id})">완료 처리</button>
        <button class="btn btn-ghost" onclick="closeSheet()">취소</button>
      </div>
    </div>`);
}
function closeSheet(){ const o=document.getElementById('ov'); if(o)o.remove(); }
// 프리셋/부품 칩 → 입력칸에 추가
function appendField(id,text){ const el=document.getElementById(id); if(!el)return; el.value = el.value ? (el.value.replace(/\s*$/,'').replace(/,\s*$/,'')+', '+text) : text; }

// ── 작업 사진 (촬영/압축/미리보기) ──
let completePhotos=[];
function compressImage(file,cb){
  const reader=new FileReader();
  reader.onload=e=>{ const img=new Image(); img.onload=()=>{
    const max=1000; let w=img.width,h=img.height;
    if(w>max||h>max){ if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;} }
    const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
    cb(c.toDataURL('image/jpeg',0.6));
  }; img.src=e.target.result; };
  reader.readAsDataURL(file);
}
function addCompletePhoto(input){ const f=input.files&&input.files[0]; if(!f)return; compressImage(f,d=>{ completePhotos.push(d); renderCompletePhotos(); }); input.value=''; }
function renderCompletePhotos(){ const el=document.getElementById('w_photos'); if(!el)return;
  el.innerHTML=completePhotos.map((p,i)=>`<div style="position:relative"><img src="${p}" style="width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid #dee2e6"><span onclick="completePhotos.splice(${i},1);renderCompletePhotos()" style="position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;border-radius:50%;width:18px;height:18px;text-align:center;line-height:18px;font-size:12px;cursor:pointer">×</span></div>`).join('');
}
async function openPhotos(id){
  let photos=[]; try{ photos=await api('GET',`/receptions/${id}/photos`); }catch(e){}
  document.getElementById('app').insertAdjacentHTML('beforeend',`
    <div class="overlay" id="ov" onclick="if(event.target===this)closeSheet()">
      <div class="sheet"><h3>작업 사진 (${photos.length})</h3>
        ${photos.length? photos.map(p=>`<img src="${p.photo}" style="width:100%;border-radius:10px;margin-bottom:8px">`).join('') : '<div class="empty">사진이 없습니다</div>'}
        <button class="btn btn-ghost" onclick="closeSheet()">닫기</button>
      </div>
    </div>`);
}

// ── 작업별 채팅 ──
async function openChat(id){
  S.chatOpen=id;
  let msgs=[]; try{ msgs=await api('GET',`/receptions/${id}/messages`); }catch(e){}
  try{ await api('POST',`/receptions/${id}/messages/read?side=engineer`); }catch(e){}
  S.chatUnread[id]=0;
  renderChat(id,msgs);
}
function closeChat(){ S.chatOpen=null; closeSheet(); render(); }
function chatBubble(m){
  const mine=m.sender==='engineer';
  return `<div style="display:flex;justify-content:${mine?'flex-end':'flex-start'};margin-bottom:8px">
    <div style="max-width:78%;padding:8px 12px;border-radius:12px;background:${mine?'var(--primary)':'#f1f3f5'};color:${mine?'#fff':'#343a40'};font-size:14px;word-break:break-word">
      ${m.photo?`<img src="${m.photo}" style="max-width:100%;border-radius:8px;${m.text?'margin-bottom:4px':''}">`:''}
      ${m.text?esc(m.text):''}
    </div></div>`;
}
function renderChat(id,msgs){
  const html=`<div class="overlay" id="ov" onclick="if(event.target===this)closeChat()">
    <div class="sheet" style="display:flex;flex-direction:column;max-height:88vh">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h3 style="margin:0">💬 대화</h3><button onclick="closeChat()" style="border:none;background:none;font-size:20px;color:var(--gray-400);cursor:pointer">✕</button></div>
      <div id="chatBody" style="flex:1;overflow-y:auto;min-height:200px;padding:4px 2px">
        ${msgs.length?msgs.map(chatBubble).join(''):'<div class="empty">대화가 없습니다</div>'}
      </div>
      <div style="display:flex;gap:6px;align-items:center;border-top:1px solid #eee;padding-top:8px;margin-top:8px">
        <label style="cursor:pointer;font-size:22px;line-height:1">📷<input type="file" accept="image/*" capture="environment" onchange="sendChatPhoto(${id},this)" style="display:none"></label>
        <input id="chatText" placeholder="메시지 입력" style="flex:1;padding:10px 12px;border:1px solid #dee2e6;border-radius:9px;font-size:15px" onkeydown="if(event.key==='Enter')sendChat(${id})">
        <button class="btn btn-primary" style="width:auto;margin:0;padding:10px 16px" onclick="sendChat(${id})">전송</button>
      </div>
    </div></div>`;
  const ex=document.getElementById('ov'); if(ex)ex.outerHTML=html; else document.getElementById('app').insertAdjacentHTML('beforeend',html);
  const body=document.getElementById('chatBody'); if(body)body.scrollTop=body.scrollHeight;
}
async function sendChat(id){
  const el=document.getElementById('chatText'); if(!el)return; const text=el.value.trim(); if(!text)return;
  el.value='';
  await api('POST',`/receptions/${id}/messages`,{sender:'engineer',text});
  const msgs=await api('GET',`/receptions/${id}/messages`); renderChat(id,msgs);
}
async function sendChatPhoto(id,input){
  const f=input.files&&input.files[0]; if(!f)return;
  compressImage(f,async d=>{ await api('POST',`/receptions/${id}/messages`,{sender:'engineer',photo:d}); const msgs=await api('GET',`/receptions/${id}/messages`); renderChat(id,msgs); });
  input.value='';
}
async function submitComplete(id){
  const g=x=>document.getElementById(x).value;
  const desc=g('w_desc'); if(!desc){ alert('작업 내용을 입력하세요'); return; }
  await api('PUT',`/engineer/receptions/${id}/complete`,{ work_description:desc, parts_used:g('w_parts'), cost_parts:Number(g('w_cparts'))||0, cost_labor:Number(g('w_clabor'))||0 });
  for(const p of completePhotos){ try{ await api('POST',`/receptions/${id}/photos`,{photo:p}); }catch(e){} }
  completePhotos=[];
  closeSheet(); loadReceptions();
}

// ── SSE ──
function connectSSE(){
  if(!S.engineer)return;
  try{
    const es=new EventSource(`${API}/engineer-stream/${S.engineer.id}`);
    es.addEventListener('new_assignment',()=>{ loadReceptions(); if(navigator.vibrate)navigator.vibrate(400); });
    es.addEventListener('new_message',e=>{ let d={}; try{d=JSON.parse(e.data);}catch(x){}
      if(S.chatOpen==d.reception_id){ openChat(d.reception_id); }
      else { S.chatUnread[d.reception_id]=(S.chatUnread[d.reception_id]||0)+1; if(!document.getElementById('ov'))render(); if(navigator.vibrate)navigator.vibrate(200); }
    });
    es.onerror=()=>{ es.close(); setTimeout(connectSSE,5000); };
  }catch(e){}
}

// ── 초기화 ──
(function init(){
  const saved=localStorage.getItem('csep_eng');
  if(saved){ try{ S.engineer=JSON.parse(saved); connectSSE(); loadReceptions(true); return; }catch(e){} }
  renderLogin();
})();
setInterval(()=>{ if(S.engineer)loadReceptions(); }, 15000);
</script>
