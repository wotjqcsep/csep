<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CSEP 기사앱</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1f2b">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
<style>
:root{--primary:#3b5bdb;--success:#2f9e44;--warning:#f08c00;--danger:#e03131;--bg:#f1f3f5;--gray-400:#adb5bd;--gray-500:#868e96;--gray-600:#495057}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Malgun Gothic',-apple-system,sans-serif;background:var(--bg);color:#343a40;font-size:15px;max-width:520px;margin:0 auto;min-height:100vh}
.topbar{background:#1a1f2b;color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.topbar h1{font-size:18px;color:#6b9cff}
.topbar .who{font-size:13px;color:#c9ced8}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e9ecef;position:sticky;top:52px;z-index:40}
.tab{flex:1;padding:12px;border:none;background:none;font-size:14px;color:var(--gray-500);cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--primary);font-weight:700;border-bottom-color:var(--primary)}
.content{padding:14px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.cust-name{font-size:17px;font-weight:700}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600}
.badge.new{background:#e7f5ff;color:#1971c2}
.badge.assigned{background:#fff3bf;color:#e67700}
.badge.in_progress{background:#d3f9d8;color:#2b8a3e}
.badge.completed{background:#e9ecef;color:#868e96}
.info-line{font-size:13px;color:var(--gray-600);margin:3px 0}
.info-line a{color:var(--primary);text-decoration:none}
.symptom{background:var(--bg);border-radius:8px;padding:10px;margin:8px 0;font-size:14px}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-primary{background:var(--primary);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-ghost{background:#f1f3f5;color:var(--gray-600)}
.empty{text-align:center;padding:60px 20px;color:var(--gray-400)}
/* 로그인 */
.login{padding:40px 24px;text-align:center}
.login h2{font-size:24px;color:var(--primary);margin-bottom:6px}
.login p{color:var(--gray-500);margin-bottom:30px;font-size:14px}
.eng-btn{display:block;width:100%;padding:16px;margin-bottom:10px;border:1px solid #dee2e6;border-radius:12px;background:#fff;font-size:16px;cursor:pointer;text-align:left}
.eng-btn:hover{border-color:var(--primary)}
.eng-btn .role{float:right;font-size:12px;color:var(--warning)}
/* 모달 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.sheet{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:22px}
.sheet h3{font-size:18px;margin-bottom:16px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:13px;color:var(--gray-600);margin-bottom:5px}
.fg input,.fg textarea{width:100%;padding:11px 13px;border:1px solid #dee2e6;border-radius:9px;font-size:15px;font-family:inherit}
.fg textarea{min-height:80px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
</style>
</head>
<body>
<div id="app"><div class="empty">불러오는 중...</div></div>

<script>
const API='/api';
const S={ engineer:null, tab:'active', receptions:[], engineers:[], customers:[], computers:[], presets:[], parts:[], chatUnread:{}, chatOpen:null, stats:null, schedules:[], processing:null, statusFilter:'pending', procPhotos:[], procExisting:[], incomingCalls:[], modalRec:null };
const DEVICE_TYPES={ desktop:'데스크톱', laptop:'노트북', server:'서버', printer:'프린터', other:'기타' };
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const won=n=>'₩'+(Number(n)||0).toLocaleString();
async function api(m,u,b){const o={method:m,headers:{'Content-Type':'application/json'}};if(b)o.body=JSON.stringify(b);const r=await fetch(API+u,o);if(!r.ok)throw new Error((await r.json().catch(()=>({}))).error||r.status);return r.json();}

// ── 로그인 ──
async function renderLogin(){
  let engineers=[];
  try{ engineers=await api('GET','/engineers'); }catch(e){}
  document.getElementById('app').innerHTML=`
    <div class="login">
      <h2>CSEP 기사앱</h2><p>본인 이름을 선택하세요</p>
      ${engineers.length? engineers.map(e=>`<button class="eng-btn" onclick="login(${e.id},${e.is_admin})">${esc(e.name)}${e.is_admin?'<span class="role">대표</span>':''}</button>`).join('') : '<p style="color:var(--gray-400)">등록된 기사가 없습니다.<br>관리자 화면에서 기사를 먼저 추가하세요.</p>'}
    </div>`;
}
async function login(id,isAdmin){
  let password=null;
  if(isAdmin){ password=prompt('대표 비밀번호:'); if(password===null)return; }
  try{
    const e=await api('POST','/engineer-login',{engineer_id:id,password});
    S.engineer=e; localStorage.setItem('csep_eng',JSON.stringify(e));
    connectSSE(); loadReceptions(true); setupPush(); setNativeRole(); pollIncoming();
  }catch(err){ alert(err.message); }
}
function logout(){ localStorage.removeItem('csep_eng'); S.engineer=null; clearNativeRole(); renderLogin(); }
// 네이티브(APK) 전화감지 게이팅용 역할 저장 (대표만 감지)
function setNativeRole(){
  try{ const P=window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.Preferences;
    if(P&&S.engineer){ P.set({key:'csep_role',value:S.engineer.is_admin?'대표':'기사'}); P.set({key:'csep_api',value:API}); }
  }catch(e){}
}
function clearNativeRole(){ try{ const P=window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.Preferences; if(P)P.set({key:'csep_role',value:'none'}); }catch(e){} }

// ── 데이터 ──
async function loadReceptions(showLoading){
  if(!S.engineer)return;
  try{
    const all = S.engineer.is_admin ? '?all=1' : '';   // 대표는 전체 조회 (미배정·전체 탭용)
    S.receptions = await api('GET',`/engineer/${S.engineer.id}/receptions${all}`);
    if(!S.presets.length){ try{ S.presets = await api('GET','/result-presets'); }catch(e){} }
    if(!S.parts.length){ try{ S.parts = await api('GET','/inventory'); }catch(e){} }
    try{ S.chatUnread = await api('GET',`/messages/unread-engineer/${S.engineer.id}`); }catch(e){}
    if(S.engineer.is_admin){
      if(!S.engineers.length){ try{ S.engineers = await api('GET','/engineers'); }catch(e){} }
      if(!S.customers.length){ try{ S.customers = await api('GET','/customers'); }catch(e){} }
      if(!S.computers.length){ try{ S.computers = await api('GET','/computers'); }catch(e){} }
      try{ S.stats = await api('GET','/stats'); }catch(e){}
    }
    if(showLoading || !isEditing()) render();   // 편집 중(음성·작성)엔 화면 안 지움
  }catch(e){ if(showLoading)document.getElementById('app').innerHTML='<div class="empty">서버 연결 실패</div>'; }
}
// 편집 중이면 배경 새로고침이 화면을 다시 그리지 않게
function isEditing(){ return !!S.processing || S.tab==='wo' || !!document.getElementById('ov') || !!document.getElementById('ov2'); }
function engName(id){ const e=S.engineers.find(x=>x.id==id); return e?e.name:(id?`기사${id}`:'-'); }

// ── 렌더 ──
function render(){
  if(!S.engineer)return renderLogin();
  if(S.processing){ renderProcessing(); return; }
  const isAdmin=S.engineer.is_admin, myId=S.engineer.id;
  const notDone=r=>r.status!=='completed';
  const reserved=r=>r.reserved_date&&notDone(r);
  const mineActive=S.receptions.filter(r=>r.assigned_engineer_id==myId&&notDone(r));
  const done=S.receptions.filter(r=>r.status==='completed');
  const tabs = isAdmin
    ? [['all','📊 전체현황'],['wo','➕ 작업지시'],['done','📁 완료이력'],['sched','📅 일정관리']]
    : [['list','📋 작업목록'],['done','📁 완료이력'],['sched','📅 일정']];
  if(!tabs.some(t=>t[0]===S.tab)) S.tab=tabs[0][0];
  let content='';
  if(S.tab==='wo'){ content=`<div id="woTab"></div>`; }
  else if(S.tab==='sched'){ content=`<div id="schedInline"></div>`; }
  else if(S.tab==='done'){ const dl=isAdmin?done:done.filter(r=>r.assigned_engineer_id==myId); content=dl.length?dl.map(cardHtml).join(''):'<div class="empty">완료 작업이 없습니다</div>'; }
  else if(isAdmin){
    const f=S.statusFilter||'pending';
    const cnt={pending:S.receptions.filter(r=>notDone(r)&&!reserved(r)).length,reserved:S.receptions.filter(reserved).length,completed:done.length,all:S.receptions.length};
    const flist=f==='reserved'?S.receptions.filter(reserved):f==='completed'?done:f==='all'?S.receptions:S.receptions.filter(r=>notDone(r)&&!reserved(r));
    const chips=[['pending','🔴 미처리'],['reserved','🟡 예약'],['completed','🟢 완료'],['all','전체']];
    content=`<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">${chips.map(([k,l])=>`<span onclick="S.statusFilter='${k}';render()" style="padding:6px 12px;border-radius:16px;font-size:13px;cursor:pointer;${f===k?'background:var(--primary);color:#fff':'background:#fff;border:1px solid #dee2e6'}">${l} ${cnt[k]}</span>`).join('')}</div>`
      +(flist.length?flist.map(cardHtml).join(''):'<div class="empty">작업이 없습니다</div>');
  } else { content=mineActive.length?mineActive.map(cardHtml).join(''):'<div class="empty">작업이 없습니다</div>'; }
  const soundName=localStorage.getItem('csep_sound')||'noti1';
  document.getElementById('app').innerHTML=`
    <div class="topbar"><h1>🔧 현장 기사 앱</h1><span class="who">${esc(S.engineer.name)} ${isAdmin?'대표':'기사'} · <a onclick="logout()" style="color:#6b9cff;cursor:pointer">로그아웃</a></span></div>
    <div class="tabs">${tabs.map(([id,label])=>`<button class="tab ${S.tab===id?'active':''}" onclick="setTab('${id}')">${label}</button>`).join('')}</div>
    <div style="padding:12px 14px 0"><button class="btn" style="margin:0;background:#2b3140;color:#fff" onclick="openSoundPicker()">🔔 알림 소리 선택 (${soundName})</button></div>
    <div class="content">${content}</div>`;
  if(S.tab==='wo')renderWoTab();
  if(S.tab==='sched')renderScheduleInline();
}
function setTab(t){ S.tab=t; if(t==='sched'){ schedState={ym:new Date().toISOString().slice(0,7),sel:null}; loadSchedules().then(render); return; } render(); }

function cardHtml(r){
  const isAdmin=S.engineer.is_admin, mine=r.assigned_engineer_id==S.engineer.id;
  const isRes=r.reserved_date&&r.status!=='completed';
  const st=isRes?'예약':({new:'미처리',assigned:'미처리',in_progress:'진행중',completed:'완료'}[r.status]||r.status);
  const badgeClass=isRes?'assigned':r.status;
  return `<div class="card">
    <div class="card-head">
      <div><div class="cust-name">${esc(r.customer_name)||esc(r.customer_phone)||'고객'}</div>${r.customer_company?`<div class="info-line">${esc(r.customer_company)}</div>`:''}</div>
      <span class="badge ${badgeClass}">● ${st}</span>
    </div>
    ${isAdmin&&r.assigned_engineer_id?`<div class="info-line">👤 ${esc(engName(r.assigned_engineer_id))}</div>`:''}
    ${r.customer_phone?`<div class="info-line">📞 <a href="tel:${esc(r.customer_phone)}">${esc(r.customer_phone)}</a></div>`:''}
    ${r.customer_address?`<div class="info-line">📍 ${esc(r.customer_address)}</div>
      <div style="display:flex;gap:6px;margin:6px 0"><button class="btn" style="flex:1;margin:0;background:#4263eb;color:#fff;padding:8px" onclick="navTmapFor(${r.id})">🧭 티맵</button><button class="btn" style="flex:1;margin:0;background:#fab005;color:#3d3000;padding:8px" onclick="navKakaoFor(${r.id})">🗺️ 카카오맵</button></div>`:''}
    <div class="symptom">🔧 ${esc(r.symptom)||'(증상 없음)'}</div>
    ${r.reserved_date&&r.status!=='completed'?`<div class="info-line" style="color:var(--warning)">📅 예약: ${esc(r.reserved_date)}</div>`:''}
    <div class="info-line" style="color:var(--gray-400);font-size:12px">${(r.received_at||'').slice(0,16).replace('T',' ')}</div>
    ${r.status==='new'&&isAdmin?`<button class="btn btn-primary" onclick="openAssign(${r.id})">기사 배정</button>`:''}
    ${r.status!=='new'&&(mine||isAdmin)?`<button class="btn btn-primary" onclick="openProcessing(${r.id})">상세보기 / 처리하기 →</button>`:''}
    ${r.status!=='new'?`<button class="btn" style="background:#7048e8;color:#fff" onclick="openChat(${r.id})">💬 대화${S.chatUnread[r.id]?` (${S.chatUnread[r.id]})`:''}</button>`:''}
    ${isAdmin&&r.status!=='completed'&&r.assigned_engineer_id?`<button class="btn btn-ghost" onclick="openAssign(${r.id})">🔁 기사 재배정</button>`:''}
  </div>`;
}

// ── 길찾기 (티맵 / 카카오맵) ──
function navTmapFor(id){ const r=S.receptions.find(x=>x.id==id); if(r&&r.customer_address)navTmap(r.customer_address); else alert('주소가 없습니다'); }
function navKakaoFor(id){ const r=S.receptions.find(x=>x.id==id); if(r&&r.customer_address)navKakao(r.customer_address); else alert('주소가 없습니다'); }
async function navTmap(addr){
  if(!addr) return;
  try{ const c=await (await fetch(`${API}/geocode?address=${encodeURIComponent(addr)}`)).json();
    if(c.lon&&c.lat){ window.location.href=`tmap://route?goalname=${encodeURIComponent(addr)}&goalx=${c.lon}&goaly=${c.lat}`; return; }
  }catch(e){}
  window.location.href=`tmap://search?keyword=${encodeURIComponent(addr)}`;
}
async function navKakao(addr){
  if(!addr) return;
  const enc=encodeURIComponent(addr);
  const native=window.Capacitor&&window.Capacitor.isNativePlatform&&window.Capacitor.isNativePlatform();
  try{ const c=await (await fetch(`${API}/geocode?address=${encodeURIComponent(addr)}`)).json();
    if(c.lon&&c.lat){ const ep=`${c.lat},${c.lon}`;
      if(native) window.location.href=`kakaomap://route?ep=${ep}&by=CAR`;
      else if(/android/i.test(navigator.userAgent)) window.location.href=`intent://route?ep=${ep}&by=CAR#Intent;scheme=kakaomap;package=net.daum.android.map;end`;
      else window.open(`https://map.kakao.com/link/to/${enc},${c.lat},${c.lon}`,'_blank');
      return; }
  }catch(e){}
  // 좌표 없음(카카오 키 미설정) → 이전 작동 방식인 웹 지도 링크로 폴백
  window.open(`https://map.kakao.com/?q=${enc}`,'_blank');
}

// ── 알림 소리 선택 (UI, 실제 소리는 APK 푸시에서) ──
function pickSound(k){
  localStorage.setItem('csep_sound',k);
  try{ const P=window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.Preferences; if(P)P.set({key:'csep_sound',value:k}); }catch(e){}
  closeSheet(); render();
}
function openSoundPicker(){
  const cur=localStorage.getItem('csep_sound')||'noti1';
  const sounds=[['noti1','기본음'],['noti2','벨소리'],['noti3','띵동'],['noti4','알림'],['noti5','차임']];
  document.body.insertAdjacentHTML('beforeend',`<div class="overlay" id="ov" onclick="if(event.target===this)closeSheet()">
    <div class="sheet"><h3>🔔 알림 소리 선택</h3>
      ${sounds.map(([k,l])=>`<div onclick="pickSound('${k}')" style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border:1px solid #eee;border-radius:10px;margin-bottom:8px;cursor:pointer;${cur===k?'border-color:var(--primary);background:#e7f5ff':''}"><span>${l}</span>${cur===k?'<span style="color:var(--primary)">✓</span>':''}</div>`).join('')}
      <div style="font-size:12px;color:var(--gray-400);margin:6px 0">실제 알림음은 앱(APK) 푸시에서 재생됩니다.</div>
      <button class="btn btn-ghost" onclick="closeSheet()">닫기</button>
    </div></div>`);
}

// ── 작업 처리 페이지 ──
async function openProcessing(id){
  S.processing=id; S.procPhotos=[]; S.procExisting=[];
  try{ S.procExisting=await api('GET',`/receptions/${id}/photos`); }catch(e){}
  render();
}
function closeProcessing(){ S.processing=null; render(); }
function renderProcessing(){
  const r=S.receptions.find(x=>x.id==S.processing); if(!r){ closeProcessing(); return; }
  const done=r.status==='completed';
  const addr=r.customer_address||'';
  document.getElementById('app').innerHTML=`
    <div class="topbar"><h1>🔧 작업 처리</h1><span class="who"><a onclick="closeProcessing()" style="color:#6b9cff;cursor:pointer">← 목록</a></span></div>
    <div class="content">
      <div class="card">
        <div class="cust-name">${esc(r.customer_name)||esc(r.customer_phone)||'고객'}</div>
        <span class="badge ${done?'completed':'new'}">● ${done?'완료':'미처리'}</span>
        ${r.customer_phone?`<div class="info-line" style="margin-top:6px">📞 <a href="tel:${esc(r.customer_phone)}">${esc(r.customer_phone)}</a></div>`:''}
        ${addr?`<div class="info-line">📍 ${esc(addr)}</div>`:''}
        <div class="row2" style="margin-top:8px">
          <button class="btn" style="background:#4263eb;color:#fff;margin:0" onclick="navTmap('${esc(addr)}')">🧭 티맵</button>
          <button class="btn" style="background:#fab005;color:#3d3d00;margin:0" onclick="navKakao('${esc(addr)}')">🗺️ 카카오맵</button>
        </div>
      </div>
      <div class="symptom">🔧 ${esc(r.symptom)||'(증상 없음)'}</div>
      <button class="btn btn-ghost" onclick="openHistory(${r.customer_id})" style="border:1px solid var(--warning);color:var(--warning)">🕘 이 거래처 수리/점검 이력 보기</button>
      ${done?renderProcDone(r):`
      <div class="card">
        <div style="font-weight:700;margin-bottom:8px">📝 처리 결과 입력</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">${S.presets.map((p,i)=>`<span onclick="appendField('p_desc',S.presets[${i}].text)" style="padding:5px 10px;background:#e7f5ff;color:#1971c2;border-radius:14px;font-size:12px;cursor:pointer">✓ ${esc(p.text)}</span>`).join('')}</div>
        <div class="fg"><label>처리 내용 *</label>
          <div style="display:flex;gap:6px;align-items:flex-start"><textarea id="p_desc" placeholder="처리 내용을 입력하세요" style="flex:1">${esc(r.work_description||'')}</textarea><button id="mic_p_desc" onclick="startVoice('p_desc',true)" style="border:1px solid #dee2e6;background:#fff;border-radius:9px;width:44px;height:44px;font-size:20px;cursor:pointer">🎤</button></div>
        </div>
        <div class="fg"><label>교체 부품 (없으면 빈칸, 직접입력 가능)</label><input id="p_parts" value="${esc(r.parts_used||'')}">
          ${S.parts.length?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">${S.parts.slice(0,12).map((p,i)=>`<span onclick="appendField('p_parts',S.parts[${i}].part_name)" style="padding:5px 10px;background:#f1f3f5;border-radius:14px;font-size:12px;cursor:pointer">+ ${esc(p.part_name)}</span>`).join('')}</div>`:''}
        </div>
        <div class="fg"><label>다음 방문시 필요 부품 및 조치</label><input id="p_next" value="${esc(r.next_visit_parts||'')}"></div>
        <div class="fg"><label>고객 요청사항</label><input id="p_req" value="${esc(r.customer_request||'')}"></div>

let completePhotos=[];
function compressImage(file,cb){
  const reader=new FileReader();
  reader.onload=e=>{ const img=new Image(); img.onload=()=>{
    const max=1000; let w=img.width,h=img.height;
    if(w>max||h>max){ if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;} }
    const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
    cb(c.toDataURL('image/jpeg',0.6));
  }; img.src=e.target.result; };
  reader.readAsDataURL(file);
}
function addCompletePhoto(input){ const f=input.files&&input.files[0]; if(!f)return; compressImage(f,d=>{ completePhotos.push(d); renderCompletePhotos(); }); input.value=''; }

  if(c.customer){ S.tab='wo'; woState={customerId:String(c.customer.id),search:''}; render(); }
  else { openCustomerAdd(c.phone); }   // 미등록 → 현장 고객 등록(주소·연락처만)
  // 팝업/서버 정리는 백그라운드로 (실패해도 화면 전환엔 영향 없음)
  S.incomingCalls=S.incomingCalls.filter(x=>x.id!=id); renderIncoming();
  api('DELETE','/incoming-call/'+id).catch(()=>{});
}

// ── 🎤 음성 입력 (말 → 글자) — APK는 네이티브, 브라우저는 웹 음성인식 ──
async function startVoice(targetId, append){
  const el=document.getElementById(targetId); if(!el) return;
  const btn=document.getElementById('mic_'+targetId);
  const set=t=>{ if(btn) btn.textContent=t; };
  const put=t=>{ if(t) el.value = (append && el.value) ? (el.value.trim()+' '+t) : t; };
  // ① Capacitor 네이티브 음성인식
  const cap=window.Capacitor;
  if(cap && cap.isNativePlatform && cap.isNativePlatform() && cap.Plugins && cap.Plugins.SpeechRecognition){
    const SR=cap.Plugins.SpeechRecognition;
    try{
      const perm=await SR.requestPermissions();
      set('🔴');
      const res=await SR.start({ language:'ko-KR', maxResults:1, partialResults:false, popup:false });
      set('🎤');
      put((res && res.matches && res.matches[0]) || '');
    }catch(e){ set('🎤'); console.log('네이티브 음성 실패:', e); alert('음성 인식을 사용하려면 마이크 권한을 허용하세요.'); }
    return;
  }
  // ② 브라우저 웹 음성인식
  const WSR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!WSR){ alert('이 기기는 음성 입력을 지원하지 않습니다.'); return; }
  set('🔴');
  const rec=new WSR(); rec.lang='ko-KR'; rec.interimResults=false; rec.maxAlternatives=1;
  rec.onresult=e=>put(e.results[0][0].transcript);
  rec.onerror=e=>console.log('음성오류', e.error);
  rec.onend=()=>set('🎤');
  try{ rec.start(); }catch(e){ set('🎤'); }
}
function micField(id, label, val, placeholder){
  return `<div class="fg"><label>${label}</label>
    <div style="display:flex;gap:6px;align-items:center">
      <input id="${id}" value="${esc(val)||''}" placeholder="${placeholder||''}" style="flex:1">
      <button id="mic_${id}" onclick="startVoice('${id}',true)" style="border:1px solid #dee2e6;background:#fff;border-radius:9px;width:44px;height:42px;font-size:20px;cursor:pointer">🎤</button>
    </div></div>`;
}

// ── 대표: 현장 고객 등록 (음성) ──
function openCustomerAdd(prefillPhone){
  document.body.insertAdjacentHTML('beforeend',`<div class="overlay" id="ov" onclick="if(event.target===this)closeSheet()">
    <div class="sheet"><h3>🧑 현장 고객 등록</h3>
      <div style="font-size:12px;color:var(--gray-500);margin-bottom:8px">🎤 버튼을 누르고 말하면 자동 입력됩니다 (운전 중엔 음성 추천)</div>
      <div class="fg"><label>고객 구분</label><select id="ca_type" style="width:100%;padding:11px;border:1px solid #dee2e6;border-radius:9px"><option value="personal">개인</option><option value="business">기업</option></select></div>
      ${micField('ca_name','고객명 (선택)','','예: 홍길동')}
      ${micField('ca_phone','전화번호 *',prefillPhone||'','')}
      ${micField('ca_addr','주소','','예: 천안시 서북구...')}
      ${micField('ca_memo','메모','','증상·특이사항')}
      <button class="btn btn-primary" onclick="saveCustomerAdd()">저장 + 작업지시</button>
      <button class="btn btn-ghost" onclick="closeSheet()">취소</button>
    </div></div>`);
}
async function saveCustomerAdd(){
  const g=x=>{const el=document.getElementById(x);return el?el.value.trim():'';};
  const phone=g('ca_phone'); if(!phone){ alert('전화번호를 입력하세요'); return; }
  const memo=g('ca_memo');
  const cust=await api('POST','/customers',{ name:g('ca_name'), phone, customer_type:g('ca_type'), address:g('ca_addr'), memo });
  closeSheet();
  if(!S.customers.some(c=>c.id==cust.id)) S.customers.push(cust);
  S.tab='wo'; woState={customerId:String(cust.id),search:''}; render();
  setTimeout(()=>{ const s=document.getElementById('woT_symptom'); if(s&&memo)s.value=memo; }, 120);
}

// ── SSE ──
function connectSSE(){
  if(!S.engineer)return;
  try{
    const es=new EventSource(`${API}/engineer-stream/${S.engineer.id}`);
    es.addEventListener('new_assignment',()=>{ loadReceptions(); if(navigator.vibrate)navigator.vibrate(400); });
    es.addEventListener('new_message',e=>{ let d={}; try{d=JSON.parse(e.data);}catch(x){}
      if(S.chatOpen==d.reception_id){ openChat(d.reception_id); }
      else { S.chatUnread[d.reception_id]=(S.chatUnread[d.reception_id]||0)+1; if(!document.getElementById('ov'))render(); if(navigator.vibrate)navigator.vibrate(200); }
    });
    es.onerror=()=>{ es.close(); setTimeout(connectSSE,5000); };
  }catch(e){}
}

// ── 초기화 ──
(function init(){
  const saved=localStorage.getItem('csep_eng');
  if(saved){ try{ S.engineer=JSON.parse(saved); connectSSE(); loadReceptions(true); setupPush(); setNativeRole(); pollIncoming(); return; }catch(e){} }
  renderLogin();
})();
setInterval(()=>{ if(S.engineer)loadReceptions(); }, 15000);
setInterval(pollIncoming, 3000);
</script>
